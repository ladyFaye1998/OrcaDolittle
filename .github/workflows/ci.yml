name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test runner
        run: python -m pip install --upgrade pip pytest
      - name: Run lightweight regression tests
        run: pytest -q
